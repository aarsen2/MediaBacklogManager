<div class="movie-form-container">

  <h2 class="forms-title">Create Movie</h2>
  <form class="forms-form" [formGroup]="form" (ngSubmit)="submit()">


    <!-- Title -->
    <div class="forms-field">
      <label class="forms-label">Title</label>
      <input class="forms-input" type="text" formControlName="title" />
      @if (form.get('title')?.invalid && form.get('title')?.touched) {
      <small class="forms-error">Title is required</small>
      }
    </div>


    <!-- Description -->
    <div class="forms-field">
      <label class="forms-label">Description</label>
      <input class="forms-input" type="text" formControlName="description">
    </div>



    <!-- Release Date -->
    <div class="forms-field">
      <label class="forms-label">Release Date</label>
      <input class="forms-input" type="date" formControlName="releaseDate" />
      @if (form.get('title')?.invalid && form.get('releaseDate')?.touched) {
      <small class="error">Release date is required</small>
      }
    </div>

    <!-- Rating -->
    <div class="forms-field">
      <label class="forms-label">Rating (0-5)</label>
      <input class="forms-input" type="number" step="0.1" formControlName="generalRating" />
    </div>

    <!-- Runtime -->
    <div class="forms-field">
      <label class="forms-label">Runtime (minutes)</label>
      <input class="forms-input" type="number" formControlName="runTime" />
    </div>

    <!-- Language -->
    <div class="forms-field">
      <label class="forms-label">Language</label>
      <input class="forms-input" type="text" formControlName="language" />
    </div>

    <!-- Director -->
    <div class="forms-field">
      <label class="forms-label">Director</label>
      <input class="forms-input" type="text" formControlName="director" />
    </div>

    <!-- Content Rating -->
    <div class="forms-field">
      <label class="forms-label">Content Rating</label>
      <select class="forms-input" formControlName="contentRating">
        <option value="G">G</option>
        <option value="PG">PG</option>
        <option value="PG13">PG13</option>
        <option value="R">R</option>
      </select>
    </div>

    <div class="separator"></div>

    <!-- Submit -->
    <button class="forms-button" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating...' : 'Create Movie' }}
    </button>

  </form>

  <!-- Messages -->
  @if (successMessage) {
  <p class="forms-success">{{ successMessage }}</p>
  }

  @if (errorMessage) {
  <p class="forms-error">{{ errorMessage }}</p>
  }

</div>
