<div class="container">
  @if (items) {
  <div class="MediaCarousel scrollable">
    @for (mediaItem of items; track mediaItem.id) {
    <div class="MediaCard" (click)="viewItem(mediaItem)">
      <h1>{{ mediaItem.title }}</h1>
      <p>{{ mediaItem.description }}</p>
    </div>
    }
  </div>
  }
</div>
