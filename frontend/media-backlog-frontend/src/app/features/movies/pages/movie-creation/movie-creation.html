<div class="movie-form-container">

  <h2>Create Movie</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <!-- Title -->
    <div class="field">
      <label>Title</label>
      <input type="text" formControlName="title" />
      @if (form.get('title')?.invalid && form.get('title')?.touched) {
        <small class="error">Title is required</small>
      }
    </div>

    <!-- Description -->
    <div class="field">
      <label>Description</label>
      <textarea formControlName="description"></textarea>
      @if (form.get('description')?.invalid && form.get('description')?.touched) {
        <small class="error">Description is required</small>
      }
    </div>

    <!-- Release Date -->
    <div class="field">
      <label>Release Date</label>
      <input type="date" formControlName="releaseDate" />
    </div>

    <!-- Rating -->
    <div class="field">
      <label>Rating (0-10)</label>
      <input type="number" step="0.1" formControlName="generalRating" />
    </div>

    <!-- Runtime -->
    <div class="field">
      <label>Runtime (minutes)</label>
      <input type="number" formControlName="runTime" />
    </div>

    <!-- Language -->
    <div class="field">
      <label>Language</label>
      <input type="text" formControlName="language" />
    </div>

    <!-- Director -->
    <div class="field">
      <label>Director</label>
      <input type="text" formControlName="director" />
    </div>

    <!-- Content Rating -->
    <div class="field">
      <label>Content Rating</label>
      <select formControlName="contentRating">
        <option value="G">G</option>
        <option value="PG">PG</option>
        <option value="PG13">PG13</option>
        <option value="R">R</option>
      </select>
    </div>

    <!-- Genres (simple placeholder for now) -->
    <div class="field">
      <label>Genres</label>
      <input type="text" placeholder="Comma separated (e.g. Action, Sci-Fi)" />
    </div>

    <!-- Assets (placeholder for now) -->
    <div class="field">
      <label>Assets</label>
      <input type="text" placeholder="Asset URLs (future feature)" />
    </div>

    <!-- Submit -->
    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating...' : 'Create Movie' }}
    </button>

  </form>

  <!-- Messages -->
  @if (successMessage) {
    <p class="success">{{ successMessage }}</p>
  }

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

</div>
