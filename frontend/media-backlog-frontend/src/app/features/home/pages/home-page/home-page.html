<h1>Home</h1>

<!--Ensures that the dashboaard data is usable  -->
@if (dashboard(); as data) {


<!-- Creates a media carousel for each section -->
@for (section of data.sections; track section.title) {


<!-- Only show sections with items -->
@if (section.items.length > 0) {
<h2>{{section.title}}</h2>
<app-media-carousel [items]="section.items"></app-media-carousel>
}
}
} @else {
<p>Loading...</p>
}
