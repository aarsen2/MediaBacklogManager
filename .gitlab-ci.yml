image: node:20

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - cd frontend/media-backlog-frontend
    - npm install
    - npm run build -- --configuration production
  artifacts:
    paths:
      - frontend/media-backlog-frontend/dist/

deploy:
  stage: deploy
  script:
    - npm install -g @azure/static-web-apps-cli
    - swa deploy ./frontend/media-backlog-frontend/dist/media-backlog-frontend \
        --deployment-token $AZURE_STATIC_WEB_APPS_API_TOKEN \
  only:
    - main

    